version: "3.8"

# VibeMind OpenClaw Gateway — Master-Orchestrator for AgentFarm
#
# Start: docker compose -f docker-compose.openclaw.yml up -d
# Status: docker compose -f docker-compose.openclaw.yml logs -f
# Stop: docker compose -f docker-compose.openclaw.yml down

services:
  vibemind-openclaw:
    build:
      context: ./external/openclaw
      dockerfile: Dockerfile
      args:
        # Only extensions that actually exist under ./external/openclaw/extensions/.
        # Removed (reason):
        #   - coding-engine-bridge: not in repo; Coding Engine bridges via Python only.
        #   - hotel-concierge: lives in vibemind-os/openclaw, not in this build context;
        #     to be replaced by a future "mailcow-integration" extension.
        OPENCLAW_EXTENSIONS: "discord whatsapp ollama"
        # Sandbox-browser (noVNC live view) requires the docker CLI inside the
        # container to spawn the openclaw-sbx-* browser container via the
        # mounted /var/run/docker.sock. Without this, sandbox mode fails with
        # "docker command not found in PATH".
        OPENCLAW_INSTALL_DOCKER_CLI: "1"
    container_name: vibemind-openclaw
    command: ["node", "openclaw.mjs", "gateway", "--allow-unconfigured", "--bind", "lan"]
    user: "root"
    ports:
      - "${OPENCLAW_PORT:-18789}:18789"   # Gateway WebSocket API
      - "18790:18790"                     # WebChat UI (optional)
    volumes:
      # OpenClaw config + state
      - openclaw-data:/root/.openclaw
      # Gateway config (mode=local, ACP enabled)
      - ./python/spaces/autogen/config/openclaw_gateway.json:/root/.openclaw/openclaw.json
      # Device pairing (copied from coding-engine, enables write scopes)
      - ./python/spaces/autogen/config/paired.json:/root/.openclaw/devices/paired.json
      # AgentFarm config (agent definitions, channel bindings)
      - ./python/spaces/autogen/config/openclaw_agents.yaml:/root/.openclaw/config/agents.yaml:ro
      # Access to project for sandboxed execution
      - ./python/spaces/autogen/farm:/app/farm:ro
      - ./data:/app/data
      # Docker socket for sandbox containers
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      # LLM Provider (read from Docker secrets at /run/secrets/*)
      - OPENCLAW_DEFAULT_MODEL=${OPENCLAW_DEFAULT_MODEL:-openai/gpt-5.4}
      # Gateway
      - OPENCLAW_GATEWAY_TOKEN=${OPENCLAW_GATEWAY_TOKEN:-vibemind-local}
      - OPENCLAW_BIND=0.0.0.0:18789
      # Minibook connection (for Swarm steps)
      - MINIBOOK_URL=http://host.gateway.docker.internal:3480
      # Sandbox config
      - OPENCLAW_SANDBOX_MODE=non-main
      - OPENCLAW_SANDBOX_BACKEND=docker
      # Secrets path
      - OPENAI_API_KEY_FILE=/run/secrets/openai_api_key
    secrets:
      - openai_api_key
    extra_hosts:
      - "host.gateway.docker.internal:host-gateway"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:18789/health', r => { process.exit(r.statusCode === 200 ? 0 : 1) })"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

# --- Docker Secrets ---
# Create with: docker secret create openai_api_key "sk-xxx"
# Or use file-based secrets for non-Swarm mode:
secrets:
  openai_api_key:
    environment: "OPENAI_API_KEY"

volumes:
  openclaw-data:
    driver: local
