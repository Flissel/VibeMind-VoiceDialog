# config/llm_models.yml — SINGLE SOURCE OF TRUTH for all VibeMind LLM models
# Edit THIS file to change any model globally across the entire system.
#
# Override any role via environment variable:
#   LLM_MODEL_CLASSIFIER=gpt-4o
#   LLM_MODEL_VOICE=gpt-4o-realtime-preview-2025-06
#
# Legacy env vars (CLASSIFIER_MODEL, OPENAI_MODEL, etc.) also work as fallbacks.

providers:
  openai:
    base_url: null
    api_key_env: "OPENAI_API_KEY"
  openrouter:
    base_url: "https://openrouter.ai/api/v1"
    api_key_env: "OPENROUTER_API_KEY"
  ollama:
    base_url: "http://localhost:11434"
    api_key_env: null

models:
  # --- Core Orchestrator ---
  classifier:
    provider: "openai"
    model: "gpt-5.4"
    max_tokens: 2048
    description: "Intent classification (IntentClassifier, RAGIntentClassifier)"

  rag_classifier:
    provider: "openai"
    model: "gpt-5.4"
    max_tokens: 4096
    description: "RAG-based semantic classification (Supermemory)"

  response:
    provider: "openai"
    model: "gpt-5.4"
    max_tokens: 2048
    description: "Response generation for voice output"

  orchestrator:
    provider: "openai"
    model: "gpt-5.4"
    max_tokens: 4096
    description: "Cloud client default (swarm/cloud_client.py)"

  analysis:
    provider: "openai"
    model: "gpt-5.4"
    max_tokens: 4096
    description: "IntentAnalysisTeam multi-hypothesis"

  # --- Agents & Routing ---
  space_agent:
    provider: "openai"
    model: "gpt-5.4"
    max_tokens: 4096
    description: "Per-space LLM tool orchestration"

  stream_listener:
    provider: "openai"
    model: "gpt-5.4"
    max_tokens: 2048
    description: "StreamListener parallel intent routing"

  space_router:
    provider: "openai"
    model: "gpt-5.4"
    max_tokens: 2048
    description: "MinibookHub SpaceRouter + enrichment"

  # --- Content Generation ---
  summary:
    provider: "openai"
    model: "gpt-5.4"
    max_tokens: 4096
    description: "Idea summarization, white papers"

  rewrite:
    provider: "openai"
    model: "gpt-5.4"
    max_tokens: 4096
    description: "Content rewriting, formatting"

  exploration:
    provider: "openai"
    model: "gpt-5.4"
    max_tokens: 4096
    description: "AI-Scientist tree search exploration"

  n8n_generator:
    provider: "openai"
    model: "gpt-5.4"
    max_tokens: 8192
    description: "N8n workflow generation"

  # --- Personality & Conversion ---
  conversion:
    provider: "openai"
    model: "gpt-5.4"
    max_tokens: 2048
    description: "ConversionAI personality responses"

  personality:
    provider: "openai"
    model: "gpt-5.4"
    max_tokens: 2048
    description: "PersonalityGenerator"

  # --- Broadcast/Profiling ---
  profiling:
    provider: "openai"
    model: "gpt-5.4"
    max_tokens: 2048
    description: "Memory sub-agent profiling"

  context:
    provider: "openai"
    model: "gpt-5.4"
    max_tokens: 2048
    description: "Context sub-agent"

  # --- Vision & Media ---
  vision:
    provider: "openai"
    model: "gpt-5.4"
    max_tokens: 4096
    description: "Vision analysis (desktop, video)"

  # --- Voice (FIXED — Realtime API) ---
  voice:
    provider: "openai"
    model: "gpt-4o-realtime-preview"
    max_tokens: null
    description: "OpenAI Realtime API voice (cannot change to non-realtime model)"

  # --- Local Fallback ---
  local:
    provider: "ollama"
    model: "llama3.1:8b"
    max_tokens: 4096
    description: "Offline Ollama fallback"

  # --- Workers ---
  summarization_worker:
    provider: "openai"
    model: "gpt-5.4"
    max_tokens: 4096
    description: "Background summarization worker"

  rewrite_worker:
    provider: "openai"
    model: "gpt-5.4"
    max_tokens: 4096
    description: "Background rewrite worker"

  # --- AgentFarm ---
  agentfarm:
    provider: "openai"
    model: "gpt-5.4"
    max_tokens: 4096
    description: "AgentFarm SwarmPipeline + ForgeOrchestrator"

  # --- Flowzen (Blaue Rose) ---
  flowzen_reasoning:
    provider: "openai"
    model: "gpt-5.4"
    max_tokens: 200
    description: "Neuroscience-based circadian reasoning for task recommendations"

  # --- Tool Orchestrator ---
  tool_orchestrator:
    provider: "openrouter"
    model: "anthropic/claude-sonnet-4"
    max_tokens: 4096
    description: "Agentic tool orchestrator (multi-step tool calling)"

  # --- Reference Resolution ---
  drope_resolver:
    provider: "ollama"
    model: "SakanaAI/DroPE-SmolLM-135M-32K"
    max_tokens: null
    description: "DroPE reference resolver (local HuggingFace model)"

  # --- Ideas Content ---
  format_dispatcher:
    provider: "openrouter"
    model: "anthropic/claude-sonnet-4-5"
    max_tokens: 4096
    description: "Ideas format dispatcher (structured formatting)"

  idea_enrichment:
    provider: "openrouter"
    model: "anthropic/claude-sonnet-4"
    max_tokens: 4096
    description: "Idea enrichment, expansion and linking"

  whitepaper:
    provider: "openrouter"
    model: "openai/gpt-4o-mini"
    max_tokens: 4096
    description: "White paper generation from ideas"

  structure_analysis:
    provider: "openrouter"
    model: "openai/gpt-4o-mini"
    max_tokens: 4096
    description: "Ideas structure analysis and requirements extraction"

  feature_extraction:
    provider: "openrouter"
    model: "openai/gpt-4o-mini"
    max_tokens: 4096
    description: "Feature extraction and documentation from ideas"

  doc_generation:
    provider: "openrouter"
    model: "openai/gpt-4o"
    max_tokens: 4096
    description: "Documentation synthesis from ideas"

  bubble_eval:
    provider: "openrouter"
    model: "openai/gpt-4o-mini"
    max_tokens: 4096
    description: "Bubble evaluation and scoring"

  # --- Desktop Automation ---
  desktop_reasoning:
    provider: "openrouter"
    model: "anthropic/claude-sonnet-4"
    max_tokens: 4096
    description: "Desktop automation reasoning and planning"

  desktop_vision:
    provider: "openrouter"
    model: "anthropic/claude-sonnet-4"
    max_tokens: 4096
    description: "Desktop automation vision (screenshot analysis)"

  desktop_vision_fast:
    provider: "openrouter"
    model: "google/gemini-2.0-flash-exp:free"
    max_tokens: 4096
    description: "Desktop automation fast vision (free tier)"

  desktop_quick:
    provider: "openrouter"
    model: "anthropic/claude-3.5-sonnet"
    max_tokens: 4096
    description: "Desktop automation quick tasks"

  desktop_orchestrator:
    provider: "openrouter"
    model: "openai/gpt-4o-mini"
    max_tokens: 4096
    description: "Desktop automation orchestrator and subagents"

  desktop_stt:
    provider: "openai"
    model: "whisper-1"
    max_tokens: null
    description: "Desktop speech-to-text (Whisper)"

  desktop_tts:
    provider: "openai"
    model: "tts-1"
    max_tokens: null
    description: "Desktop text-to-speech"

  desktop_worker:
    provider: "openrouter"
    model: "google/gemini-2.0-flash-001"
    max_tokens: 4096
    description: "Desktop automation worker host"

  # --- N8n ---
  n8n_selector:
    provider: "openai"
    model: "gpt-4o-mini"
    max_tokens: 2048
    description: "N8n SelectorGroupChat routing model"

  # --- AutoGen/AgentFarm ---
  agentfarm_anthropic:
    provider: "openrouter"
    model: "claude-sonnet-4-6"
    max_tokens: 4096
    description: "AgentFarm Anthropic provider model"

  # --- MiroFish ---
  mirofish:
    provider: "ollama"
    model: "qwen2.5:32b"
    max_tokens: 4096
    description: "MiroFish simulation LLM (local Ollama)"

  mirofish_eval:
    provider: "openai"
    model: "gpt-5.4"
    max_tokens: 4096
    description: "MiroFish evaluation model"

  mirofish_openrouter:
    provider: "openrouter"
    model: "meta-llama/llama-3.3-70b-instruct:free"
    max_tokens: 4096
    description: "MiroFish OpenRouter fallback"

  # --- Workers ---
  claude_worker:
    provider: "openrouter"
    model: "anthropic/claude-opus-4-5-20251101"
    max_tokens: 4096
    description: "Claude worker for Anthropic SDK tasks"

  # --- Messaging ---
  messaging_relevance:
    provider: "ollama"
    model: "qwen2.5:3b"
    max_tokens: 2048
    description: "Messaging relevance filter (local Ollama)"

  # --- Ideas (additional) ---
  ideas_research:
    provider: "openai"
    model: "gpt-4"
    max_tokens: 4096
    description: "Ideas AutoGen research agent"

  connection_eval:
    provider: "openrouter"
    model: "openai/gpt-4o-mini"
    max_tokens: 4096
    description: "Connection evaluator for idea linking"

  # --- MiroFish (additional) ---
  mirofish_embedding:
    provider: "ollama"
    model: "nomic-embed-text"
    max_tokens: null
    description: "MiroFish embedding model (local Ollama)"

  # --- Transcription ---
  transcription:
    provider: "openai"
    model: "whisper-1"
    max_tokens: null
    description: "Speech-to-text transcription (Whisper)"

  # --- Shuttle Wizard ---
  wizard_ollama:
    provider: "ollama"
    model: "qwen2.5:3b"
    max_tokens: 4096
    description: "Shuttle wizard Ollama provider"

  wizard_openrouter:
    provider: "openrouter"
    model: "google/gemini-2.0-flash-001"
    max_tokens: 4096
    description: "Shuttle wizard OpenRouter provider"

  wizard_openai:
    provider: "openai"
    model: "gpt-4o-mini"
    max_tokens: 4096
    description: "Shuttle wizard OpenAI provider"

  # --- Rowboat ---
  rowboat_model:
    provider: "openrouter"
    model: "anthropic/claude-sonnet-4"
    max_tokens: 4096
    description: "Rowboat agent model"
