# ════════════════════════════════════════════════════════════════════
# MULTI-STEP PATTERNS (for classifier awareness)
# ════════════════════════════════════════════════════════════════════
#
# Dependencies (for ordering in multi-step execution):
#   bubble.create  →  BEFORE  →  idea.create        (idea needs bubble)
#   bubble.enter   →  BEFORE  →  idea.list          (list needs active bubble)
#   idea.create    →  BEFORE  →  idea.connect       (connect needs ideas)
#   idea.create    →  BEFORE  →  idea.auto_link     (link needs ideas)
#
# Example multi-step intents:
#   "Erstelle Space X und füge Idee Y hinzu"
#     → [bubble.create{title:X}, idea.create{title:Y}]
#   "Erstelle Space X, betrete ihn und verlinke Ideen"
#     → [bubble.create{title:X}, bubble.enter{bubble_name:X}, idea.auto_link]
