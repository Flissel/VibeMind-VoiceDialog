# config/tool_schemas.yml — Single Source of Truth for Tool Semantics
#
# Purpose:
#   1. Few-shot examples for LLM classifier (injected per event_type)
#   2. Training data for Brain EventRoutingHead
#   3. Param validation at execution time
#   4. Auto-generated help/docs for users
#
# Schema per event:
#   description:    What the tool does (1 line)
#   params:         Required/optional parameters with types
#   returns:        Expected return shape (string | dict | list)
#   examples:       2-5 natural language → structured output pairs
#   triggers:       Keywords that should match
#   anti_triggers:  Keywords that should NOT match (disambiguation)

# ════════════════════════════════════════════════════════════════════
# BUBBLE EVENTS (7)
# ════════════════════════════════════════════════════════════════════

bubble.list:
  description: "Listet alle Bubbles (Top-Level Spaces) auf."
  params: {}
  returns: string
  examples:
    - input: "Zeig mir meine Bubbles"
      output: {}
    - input: "Welche Spaces habe ich?"
      output: {}
    - input: "What bubbles do I have?"
      output: {}
    - input: "Liste alle Bubbles"
      output: {}
  triggers: ["bubbles", "spaces", "zeig", "list", "welche"]
  anti_triggers: ["erstelle", "neu", "create"]

bubble.create:
  description: "Erstellt eine NEUE Bubble mit gegebenem Titel."
  params:
    title:
      type: string
      required: true
      description: "Name der Bubble (aus User-Text extrahieren)"
  returns: dict
  examples:
    - input: "Erstelle Bubble Marketing"
      output: {title: "Marketing"}
    - input: "Neuen Space namens Ideen"
      output: {title: "Ideen"}
    - input: "Leg einen Space für Projekte an"
      output: {title: "Projekte"}
    - input: "Create a bubble called Research"
      output: {title: "Research"}
  triggers: ["erstelle", "neu", "leg an", "create", "new"]
  anti_triggers: ["betrete", "geh zu", "enter", "öffne"]

bubble.enter:
  description: "Wechselt in eine BESTEHENDE Bubble."
  params:
    bubble_name:
      type: string
      required: true
      description: "Name der existierenden Bubble"
  returns: dict
  examples:
    - input: "Geh zu Marketing"
      output: {bubble_name: "Marketing"}
    - input: "Betrete Ideen"
      output: {bubble_name: "Ideen"}
    - input: "Öffne Bubble Projekte"
      output: {bubble_name: "Projekte"}
    - input: "Enter Research"
      output: {bubble_name: "Research"}
  triggers: ["geh", "betrete", "öffne", "enter", "switch to"]
  anti_triggers: ["erstelle", "neu", "create", "such"]

bubble.find:
  description: "Sucht eine Bubble per Fuzzy-Match und wechselt dann hinein."
  params:
    query:
      type: string
      required: true
      description: "Suchbegriff"
  returns: dict
  examples:
    - input: "Such nach Bubble Marketing"
      output: {query: "Marketing"}
    - input: "Wo ist die Projekte Bubble?"
      output: {query: "Projekte"}
    - input: "Find bubble about research"
      output: {query: "research"}
  triggers: ["such", "finde", "wo ist", "find"]
  anti_triggers: ["idee", "notiz"]

bubble.exit:
  description: "Verlässt die aktuelle Bubble, zurück zur obersten Ebene."
  params: {}
  returns: string
  examples:
    - input: "Zurück"
      output: {}
    - input: "Verlasse die Bubble"
      output: {}
    - input: "Exit"
      output: {}
    - input: "Raus hier"
      output: {}
  triggers: ["zurück", "verlasse", "exit", "back", "raus"]

bubble.delete:
  description: "Löscht eine Bubble mit allen enthaltenen Ideen."
  params:
    bubble_name:
      type: string
      required: true
  returns: dict
  examples:
    - input: "Lösche Bubble Marketing"
      output: {bubble_name: "Marketing"}
    - input: "Entferne Space Ideen"
      output: {bubble_name: "Ideen"}
    - input: "Delete bubble Research"
      output: {bubble_name: "Research"}
  triggers: ["lösche", "entferne", "delete", "remove"]
  anti_triggers: ["idee", "notiz"]

bubble.stats:
  description: "Zeigt Statistik einer Bubble (Anzahl Ideen, Score)."
  params:
    bubble_name:
      type: string
      required: false
      description: "Falls weggelassen: aktuelle Bubble"
  returns: string
  examples:
    - input: "Statistik"
      output: {}
    - input: "Stats für Marketing"
      output: {bubble_name: "Marketing"}
    - input: "Wie ist der Score?"
      output: {}
  triggers: ["stats", "statistik", "score"]

