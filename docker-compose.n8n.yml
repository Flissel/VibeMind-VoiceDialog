# n8n Workflow Builder for VibeMind
#
# Usage:
#   docker compose -f docker-compose.n8n.yml up -d --build
#
# Ports:
#   15678 → n8n Web UI + REST API
#
# VibeMind .env:
#   N8N_ENABLED=true
#   N8N_API_URL=http://localhost:15678
#   N8N_API_KEY=<generated-api-key>

services:
  n8n:
    build:
      context: ./docker/n8n
      dockerfile: Dockerfile
    container_name: vibemind-n8n
    ports:
      - "15678:5678"
    volumes:
      - vibemind-n8n-data:/home/node/.n8n
    environment:
      # Auto-provision owner account (no manual sign-up needed)
      # Owner account is provisioned via /rest/owner/setup from Electron main.js
      # Credentials: admin@vibemind.local / Vibemind1
      # API access
      - N8N_API_DISABLED=false
      - N8N_PUBLIC_API_DISABLED=false
      - N8N_PERSONALIZATION_ENABLED=false
      - N8N_API_KEY=${N8N_API_KEY:-vibemind-dev-api-key}
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY:-vibemind-dev-key-change-in-prod}
      - GENERIC_TIMEZONE=Europe/Berlin
      # Community nodes for AI Agent workflows
      - N8N_COMMUNITY_PACKAGES_ALLOW_TOOL_USAGE=true
      - N8N_TEMPLATES_ENABLED=true
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:5678/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  vibemind-n8n-data:
