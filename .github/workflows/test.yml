name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ['3.11', '3.12']
      fail-fast: false

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false  # Core tests don't need submodules

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install core dependencies
        run: |
          python -m pip install --upgrade pip
          pip install sounddevice numpy httpx requests beautifulsoup4 openai python-dotenv redis pyautogui pyperclip Pillow APScheduler

      - name: Run data layer tests
        working-directory: python
        run: python -m tests.test_data_layer

      - name: Run intent-to-tool tests
        working-directory: python
        env:
          FORCE_SYNC_MODE: "true"
        run: python -m tests.test_intent_to_tool
        continue-on-error: true  # Requires OpenAI key for full test
