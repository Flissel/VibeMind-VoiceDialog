name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  python-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff check
        run: ruff check python/ --select E,F,W --ignore E501
        continue-on-error: true  # Advisory for now

      - name: Run ruff format check
        run: ruff format --check python/
        continue-on-error: true
