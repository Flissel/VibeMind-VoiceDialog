<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Blue Rose — Journal</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #0a0a14;
            font-family: 'Segoe UI', system-ui, sans-serif;
            color: #e0e0e0;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        .journal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 24px;
            background: linear-gradient(135deg, #0d1117 0%, #161b22 100%);
            border-bottom: 1px solid rgba(51,102,204,0.2);
        }
        .journal-title {
            font-size: 18px;
            font-weight: 600;
            color: #c9d1d9;
        }
        .journal-title .rose { margin-right: 8px; filter: hue-rotate(200deg) saturate(1.5) brightness(1.2); }
        .journal-stats {
            display: flex;
            gap: 24px;
        }
        .stat { text-align: center; }
        .stat-label { font-size: 10px; text-transform: uppercase; color: #8b949e; letter-spacing: 1px; }
        .stat-value { font-size: 14px; color: #58a6ff; font-weight: 500; }
        .state-badge {
            font-size: 11px; padding: 2px 10px; border-radius: 12px;
            background: rgba(51,102,204,0.15); color: #58a6ff; border: 1px solid rgba(51,102,204,0.3);
        }

        /* Book container */
        .book-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            perspective: 1500px;
            padding: 20px;
        }

        .book {
            width: min(800px, 90vw);
            height: min(520px, 70vh);
            position: relative;
            transform-style: preserve-3d;
        }

        /* Book spine / cover */
        .book-cover {
            position: absolute;
            inset: 0;
            background: linear-gradient(145deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            border-radius: 4px 12px 12px 4px;
            border: 1px solid rgba(51,102,204,0.15);
            box-shadow:
                0 0 40px rgba(51,102,204,0.08),
                inset 0 0 60px rgba(0,0,0,0.3),
                -3px 0 8px rgba(0,0,0,0.4);
        }

        /* Pages */
        .page {
            position: absolute;
            inset: 12px;
            background: linear-gradient(135deg, #f5f0e8 0%, #ede5d8 50%, #e8dfd0 100%);
            border-radius: 2px 8px 8px 2px;
            padding: 32px 36px;
            color: #2c2419;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: transform 0.6s ease, opacity 0.3s ease;
            transform-origin: left center;
            backface-visibility: hidden;
        }
        .page.hidden { display: none; }
        .page.flipping-out {
            transform: rotateY(-120deg);
            opacity: 0;
        }
        .page.flipping-in {
            animation: flipIn 0.5s ease forwards;
        }
        @keyframes flipIn {
            from { transform: rotateY(60deg); opacity: 0; }
            to { transform: rotateY(0deg); opacity: 1; }
        }

        /* Page content */
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 6px;
            padding-bottom: 8px;
            border-bottom: 1px solid rgba(44,36,25,0.15);
        }
        .page-time {
            font-family: Georgia, 'Times New Roman', serif;
            font-size: 16px;
            font-weight: 600;
            color: #4a3f31;
        }
        .page-meta {
            font-size: 12px;
            color: #8a7d6b;
        }
        .page-mood-line {
            font-size: 12px;
            color: #6b5d4e;
            margin-bottom: 16px;
            font-style: italic;
        }
        .page-text {
            font-family: Georgia, 'Times New Roman', serif;
            font-size: 15px;
            line-height: 1.75;
            color: #3a2f22;
            flex: 1;
            overflow-y: auto;
        }
        .page-text::-webkit-scrollbar { width: 4px; }
        .page-text::-webkit-scrollbar-thumb { background: rgba(44,36,25,0.2); border-radius: 2px; }
        .page-accept {
            display: flex;
            gap: 8px;
            margin-top: 12px;
            justify-content: center;
        }
        .accept-btn, .skip-btn {
            padding: 6px 16px;
            border-radius: 6px;
            font-size: 12px;
            cursor: pointer;
            border: 1px solid rgba(44,36,25,0.2);
            background: rgba(44,36,25,0.05);
            color: #5a4a3a;
            font-family: 'SF Pro Text', -apple-system, sans-serif;
            transition: all 0.2s;
        }
        .accept-btn:hover { background: rgba(51,102,204,0.1); border-color: #3366cc; color: #3366cc; }
        .skip-btn:hover { background: rgba(44,36,25,0.08); }
        .accept-btn.accepted {
            background: rgba(51,102,204,0.12);
            border-color: #3366cc;
            color: #3366cc;
            cursor: default;
        }
        .page-source {
            text-align: right;
            font-size: 11px;
            color: #a09080;
            margin-top: 12px;
            font-style: italic;
        }

        /* Page number */
        .page-number {
            position: absolute;
            bottom: 14px;
            right: 28px;
            font-size: 11px;
            color: #b0a090;
            font-family: Georgia, serif;
        }

        /* Navigation arrows */
        .nav-arrow {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 44px; height: 44px;
            border-radius: 50%;
            border: 1px solid rgba(51,102,204,0.3);
            background: rgba(13,17,23,0.85);
            color: #58a6ff;
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            z-index: 10;
        }
        .nav-arrow:hover { background: rgba(51,102,204,0.2); border-color: #58a6ff; }
        .nav-arrow:disabled { opacity: 0.3; cursor: default; }
        .nav-arrow.left { left: -56px; }
        .nav-arrow.right { right: -56px; }

        /* Empty state */
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: #8a7d6b;
            font-family: Georgia, serif;
            font-style: italic;
            font-size: 16px;
            gap: 12px;
        }
        .empty-state .icon { font-size: 48px; }

        /* Recommend button */
        .recommend-btn {
            margin: 0 24px 16px;
            padding: 10px 20px;
            background: linear-gradient(135deg, rgba(51,102,204,0.15), rgba(51,102,204,0.08));
            border: 1px solid rgba(51,102,204,0.3);
            border-radius: 8px;
            color: #58a6ff;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
        }
        .recommend-btn:hover { background: rgba(51,102,204,0.25); }
        .recommend-btn.loading { opacity: 0.6; pointer-events: none; }

        /* Page counter */
        .page-counter {
            text-align: center;
            padding: 8px;
            font-size: 12px;
            color: #8b949e;
        }
    </style>
</head>
<body>
    <div class="journal-header">
        <span class="journal-title"><span class="rose">&#127801;</span>Blue Rose — Journal</span>
        <div class="journal-stats">
            <div class="stat">
                <div class="stat-label">Time</div>
                <div class="stat-value" id="stat-time">—</div>
            </div>
            <div class="stat">
                <div class="stat-label">Mood</div>
                <div class="stat-value" id="stat-mood">—</div>
            </div>
            <div class="stat">
                <div class="stat-label">Category</div>
                <div class="stat-value" id="stat-category">—</div>
            </div>
            <span class="state-badge" id="state-badge">idle</span>
        </div>
    </div>

    <button class="recommend-btn" id="recommend-btn">What should I do next?</button>

    <div class="book-container">
        <div class="book">
            <div class="book-cover"></div>
            <!-- Pages inserted dynamically -->
            <div id="pages-container"></div>
            <button class="nav-arrow left" id="prev-btn" disabled>&#8249;</button>
            <button class="nav-arrow right" id="next-btn" disabled>&#8250;</button>
        </div>
    </div>

    <div class="page-counter" id="page-counter"></div>

    <script>
    (function() {
        var entries = [];
        var currentPage = 0;
        var pageElements = [];
        var container = document.getElementById('pages-container');

        var WINDOW_NAMES = {
            early_morning: 'Early Morning', morning: 'Morning', midday: 'Midday',
            afternoon: 'Afternoon', evening: 'Evening', night: 'Night'
        };
        var MOOD_EMOJI = {
            energized: '\u26A1', focused: '\uD83C\uDFAF', calm: '\uD83C\uDF3F', tired: '\uD83D\uDCA4', anxious: '\u26A0\uFE0F'
        };

        // Helper: escape HTML to prevent XSS from backend data
        function escapeHtml(str) {
            var div = document.createElement('div');
            div.appendChild(document.createTextNode(str || ''));
            return div.textContent;
        }

        function buildPageDOM(entry, index, total) {
            var page = document.createElement('div');
            page.className = 'page' + (index === 0 ? '' : ' hidden');

            var timeStr = '';
            try {
                timeStr = new Date(entry.created_at).toLocaleTimeString('de-DE', {hour:'2-digit', minute:'2-digit'});
            } catch(e) {
                timeStr = (entry.hour || 0) + ':00';
            }

            var dateStr = '';
            try {
                dateStr = new Date(entry.created_at).toLocaleDateString('de-DE', {day:'2-digit', month:'long', year:'numeric'});
            } catch(e) {}

            var emoji = MOOD_EMOJI[entry.mood] || '';
            var windowName = WINDOW_NAMES[entry.time_window] || entry.time_window || '';
            var source = entry.source === 'manual' ? '\uD83C\uDF39 On request' : '\u23F0 Every 30 min';

            // Build DOM safely using textContent
            var header = document.createElement('div');
            header.className = 'page-header';

            var timeSpan = document.createElement('span');
            timeSpan.className = 'page-time';
            timeSpan.textContent = timeStr + ' \u2014 ' + windowName;
            header.appendChild(timeSpan);

            var metaSpan = document.createElement('span');
            metaSpan.className = 'page-meta';
            metaSpan.textContent = dateStr;
            header.appendChild(metaSpan);

            var moodLine = document.createElement('div');
            moodLine.className = 'page-mood-line';
            moodLine.textContent = emoji + ' ' + (entry.mood || '') + ' \u00B7 Energy ' + (entry.energy || '?') + '/10 \u00B7 ' + (entry.intent_count || 0) + ' activities \u00B7 ' + (entry.category || '');

            var textDiv = document.createElement('div');
            textDiv.className = 'page-text';
            // Convert newlines to <br> safely: split on newline, create text nodes and br elements
            var textParts = (entry.entry_text || '').split('\n');
            for (var t = 0; t < textParts.length; t++) {
                if (t > 0) textDiv.appendChild(document.createElement('br'));
                textDiv.appendChild(document.createTextNode(textParts[t]));
            }

            var sourceDiv = document.createElement('div');
            sourceDiv.className = 'page-source';
            sourceDiv.textContent = source;

            var pageNum = document.createElement('div');
            pageNum.className = 'page-number';
            pageNum.textContent = (index + 1) + ' / ' + total;

            // Acceptance buttons for manual recommendations
            var acceptDiv = null;
            if (entry.source === 'manual' && entry.raw_data) {
                acceptDiv = document.createElement('div');
                acceptDiv.className = 'page-accept';

                var logId = '';
                try { var rd = JSON.parse(entry.raw_data); logId = rd.recommendation_log_id || ''; } catch(e) {}

                if (logId) {
                    var acceptBtn = document.createElement('button');
                    acceptBtn.className = 'accept-btn';
                    acceptBtn.textContent = '\u2713 I did this';
                    acceptBtn.onclick = function() {
                        if (window.flowzenBridge) {
                            window.flowzenBridge.sendToPython({ type: 'flowzen_accept', recommendation_log_id: logId });
                        }
                        acceptBtn.disabled = true;
                        acceptBtn.textContent = '\u2713 Accepted';
                        acceptBtn.classList.add('accepted');
                        if (skipBtn) skipBtn.style.display = 'none';
                    };

                    var skipBtn = document.createElement('button');
                    skipBtn.className = 'skip-btn';
                    skipBtn.textContent = '\u2192 Skip';
                    skipBtn.onclick = function() {
                        acceptDiv.style.display = 'none';
                    };

                    acceptDiv.appendChild(acceptBtn);
                    acceptDiv.appendChild(skipBtn);
                }
            }

            page.appendChild(header);
            page.appendChild(moodLine);
            page.appendChild(textDiv);
            if (acceptDiv) page.appendChild(acceptDiv);
            page.appendChild(sourceDiv);
            page.appendChild(pageNum);

            return page;
        }

        function renderPages() {
            container.textContent = '';
            pageElements = [];

            if (entries.length === 0) {
                var empty = document.createElement('div');
                empty.className = 'page';

                var emptyState = document.createElement('div');
                emptyState.className = 'empty-state';

                var iconSpan = document.createElement('span');
                iconSpan.className = 'icon';
                iconSpan.textContent = '\uD83D\uDCD6';
                emptyState.appendChild(iconSpan);

                var line1 = document.createElement('span');
                line1.textContent = 'No journal entries yet...';
                emptyState.appendChild(line1);

                var line2 = document.createElement('span');
                line2.style.fontSize = '13px';
                line2.textContent = 'Press the button above to create your first entry';
                emptyState.appendChild(line2);

                empty.appendChild(emptyState);
                container.appendChild(empty);
                pageElements.push(empty);
                document.getElementById('page-counter').textContent = '';
                document.getElementById('prev-btn').disabled = true;
                document.getElementById('next-btn').disabled = true;
                return;
            }

            entries.forEach(function(entry, i) {
                var page = buildPageDOM(entry, i, entries.length);
                container.appendChild(page);
                pageElements.push(page);
            });

            currentPage = 0;
            updateNav();
        }

        function showPage(index) {
            if (index < 0 || index >= pageElements.length) return;

            var oldPage = pageElements[currentPage];
            var newPage = pageElements[index];

            // Flip animation
            oldPage.classList.add('flipping-out');
            setTimeout(function() {
                oldPage.classList.add('hidden');
                oldPage.classList.remove('flipping-out');
                newPage.classList.remove('hidden');
                newPage.classList.add('flipping-in');
                setTimeout(function() {
                    newPage.classList.remove('flipping-in');
                }, 500);
            }, 300);

            currentPage = index;
            updateNav();
        }

        function updateNav() {
            document.getElementById('prev-btn').disabled = currentPage <= 0;
            document.getElementById('next-btn').disabled = currentPage >= pageElements.length - 1;
            if (entries.length > 0) {
                document.getElementById('page-counter').textContent = (currentPage + 1) + ' of ' + entries.length;
            }
        }

        // Navigation
        document.getElementById('prev-btn').addEventListener('click', function() { showPage(currentPage - 1); });
        document.getElementById('next-btn').addEventListener('click', function() { showPage(currentPage + 1); });

        // Keyboard navigation
        document.addEventListener('keydown', function(e) {
            if (e.key === 'ArrowLeft') showPage(currentPage - 1);
            if (e.key === 'ArrowRight') showPage(currentPage + 1);
        });

        // Recommend button
        document.getElementById('recommend-btn').addEventListener('click', function() {
            var btn = this;
            btn.classList.add('loading');
            btn.textContent = 'Thinking...';
            if (window.flowzenDiary) window.flowzenDiary.recommend();
        });

        // Register handlers via contextBridge (contextIsolation-safe)
        if (window.flowzenDiary && window.flowzenDiary.register) {
            window.flowzenDiary.register({
                setEntries: function(data) {
                    entries = data || [];
                    renderPages();
                },
                addEntry: function(entry) {
                    entries.unshift(entry);
                    renderPages();
                },
                updateStatus: function(data) {
                    var timeEl = document.getElementById('stat-time');
                    var moodEl = document.getElementById('stat-mood');
                    var catEl = document.getElementById('stat-category');
                    var badge = document.getElementById('state-badge');

                    if (timeEl && data.current_time_window) timeEl.textContent = WINDOW_NAMES[data.current_time_window] || data.current_time_window;
                    if (moodEl && data.mood) moodEl.textContent = data.mood;
                    if (catEl && data.category) catEl.textContent = data.category;
                    if (badge && data.state) { badge.textContent = data.state; badge.className = 'state-badge ' + data.state; }
                },
                recommendDone: function(data) {
                    var btn = document.getElementById('recommend-btn');
                    if (btn) { btn.classList.remove('loading'); btn.textContent = 'What should I do next?'; }
                    if (data && data.recommendation) {
                        this.updateStatus({
                            mood: data.recommendation.mood,
                            category: data.recommendation.category,
                            current_time_window: data.recommendation.time_window,
                        });
                    }
                }
            });
        }

        // Initial render
        renderPages();
    })();
    </script>
</body>
</html>
